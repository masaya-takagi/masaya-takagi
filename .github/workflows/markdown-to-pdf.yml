name: Convert Markdown to PDF

on:
  push:
    branches:
      - master
  workflow_dispatch: # 手動実行も可能にする

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. コードをチェックアウト
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Node.js のセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Japanese Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      # 3. md-to-pdf のインストールと PDF 変換の実行
      # ※ puppeteerの設定のために --no-sandbox 等が必要な場合がありますが、
      # md-to-pdf は通常そのままで動作します。
      - name: Convert Markdown to PDF
        run: |
          npm install -g md-to-pdf
          # --launch-options で Puppeteer に --no-sandbox 引数を渡す
          npx md-to-pdf resume.md --launch-options '{"args": ["--no-sandbox"]}'

      # Gitへのコミットとプッシュ
      - name: Commit and Push PDF
        run: |
          # Gitの設定（GitHub Actions botとしてコミット）
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 変更があるか確認してコミット
          git add resume.pdf
          
          # 変更がない場合はエラーにせず終了する (|| echo ...)
          # [skip ci] を入れると、このコミットで再度Actionsが走るのを防げます
          git commit -m "Update resume PDF [skip ci]" || echo "No changes to commit"
          
          git push